<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Coderino Menajerie</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="/assets/img/favicons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/img/favicons/site.webmanifest">
  <meta name="description" content="Central index of my GitHub Pages and projects.">
</head>
<body>
  <main class="container">
    <header class="header">
      <img src="/assets/img/SmoothWitIt.jpg" alt="Avatar" class="avatar" id="avatarThumb" onerror="this.style.display='none'">
      <div>
        <h1 class="name">The Coderino Menagerie</h1>
        <p class="tagline">Behold! My stuff.</p>
      </div>
    </header>
    
    <div id="avatarModal" class="modal" aria-hidden="true" role="dialog" aria-label="Avatar preview" tabindex="-1">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-content" role="document">
        <img src="avatar.png" alt="Avatar large" class="modal-image" id="modalImage" tabindex="0" />
      </div>
    </div>

    <section class="links-grid" aria-label="Projects and pages">
      <a class="card" href="/blog" rel="noopener">
        <div class="card-head">
          <span class="card-title">The Crashpad</span>
          <span class="chip">Website</span>
        </div>
        <p class="card-desc">My blog, where I usually don't do anything important.</p>
      </a>

      <a class="card" href="https://github.com/Coderino-prime" rel="noopener">
        <div class="card-head">
          <span class="card-title">GitHub Profile</span>
          <span class="chip">Repo</span>
        </div>
        <p class="card-desc">My GitHub repositories and contributions.</p>
      </a>
    </section>

    <footer class="footer">
      <p>© <span id="year"></span> Coder </p>
    </footer>
  </main>

  <script>
    // small JS: set year and enable keyboard focus outlines when using keyboard
    document.getElementById('year').textContent = new Date().getFullYear();
    (function(){
      function handleFirstTab(e) {
        if (e.key === 'Tab') {
          document.documentElement.classList.add('user-is-tabbing');
          window.removeEventListener('keydown', handleFirstTab);
        }
      }
      window.addEventListener('keydown', handleFirstTab);
    })();
  </script>

<script>
    (function(){
      const thumb = document.getElementById('avatarThumb');
      const modal = document.getElementById('avatarModal');
      const modalImage = document.getElementById('modalImage');

      if(!thumb || !modal) return;

      function openModal(){
        modal.setAttribute('aria-hidden','false');
        modalImage.src = thumb.src; // swap to higher-res path if available
        document.body.style.overflow = 'hidden';
        // add a one-time mousedown listener that closes on left-click anywhere
        const onDocMouseDown = (e) => {
          if (e.button === 0) closeModal(); // left click
        };
        // add a key listener for Escape
        const onDocKey = (e) => { if(e.key === 'Escape') closeModal(); };

        // store handlers so we can remove them on close
        modal._handlers = { onDocMouseDown, onDocKey };
        document.addEventListener('mousedown', onDocMouseDown);
        document.addEventListener('keydown', onDocKey);

        // move focus for accessibility
        modalImage.src = thumb.src;
        document.body.style.overflow = 'hidden';
        modalImage.focus();
      }

      function closeModal(){
        modal.setAttribute('aria-hidden','true');
        document.body.style.overflow = '';
        // remove previously attached handlers
        if(modal._handlers){
          document.removeEventListener('mousedown', modal._handlers.onDocMouseDown);
          document.removeEventListener('keydown', modal._handlers.onDocKey);
          modal._handlers = null;
        }
        thumb.focus();
      }

      // prevent the opening click from immediately triggering the document listener
      thumb.addEventListener('click', (e) => { e.stopPropagation(); openModal(); });
      thumb.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(); } });

      // also allow clicking inside modal to close (the global listener handles it),
      // but stop propagation on the initial open to avoid race; nothing more needed here.
    })();
  </script>

</body>
</html>
